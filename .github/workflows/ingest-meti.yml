name: Ingest METI press releases

# METI's CDN blocks Vercel IP ranges (ETIMEDOUT). GitHub-hosted runners
# use Azure IPs, which METI accepts. We run our scraper + body fetcher
# on the runner, then POST pre-enriched JSON to the Vercel ingest
# endpoint; Vercel only inserts + summarises (no outbound to METI).

on:
  schedule:
    - cron: '30 19 * * *'  # 04:30 JST daily, ahead of the 05:00 Vercel cron
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Fetch METI, parse, post to Vercel
        env:
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          INGEST_ENDPOINT: https://kagoshima-circular-hub.vercel.app/api/ingest/meti
        run: npx tsx scripts/scrape-meti.ts
